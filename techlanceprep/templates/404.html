<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="text-8xl mb-4">😕</div>
        <h1 class="text-4xl font-bold text-gray-800 mb-2">404</h1>
        <h2 class="text-xl text-gray-600 mb-4">Page Not Found</h2>
        <p class="text-gray-500 mb-6">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-blue-800 transition">
            Go Home
        </a>
    </div>
</body>
</html>
