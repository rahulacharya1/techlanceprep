{% extends 'admin_panel/base.html' %}

{% block title %}{{ action }} Topic - Admin Panel{% endblock %}

{% block page_title %}SYSTEM_INIT{% endblock %}
{% block page_subtitle %}Registering new module to core database{% endblock %}

{% block content %}
<div class="h-[calc(100vh-200px)] flex items-center justify-center overflow-hidden">
    
    <div class="w-full max-w-2xl bg-white/[0.02] border border-white/5 rounded-[2.5rem] p-10 backdrop-blur-md shadow-2xl relative">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-[#00ff99]/5 rounded-full blur-[100px] pointer-events-none"></div>

        <form method="POST" class="space-y-8 relative z-10">
            {% csrf_token %}
            
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="block text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] ml-1">Module Label <span class="text-[#00ff99]">*</span></label>
                    <input type="text" name="name" value="{{ topic.name|default:'' }}" 
                        class="w-full bg-white/[0.03] border border-white/10 px-5 py-4 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:border-[#00ff99]/50 focus:ring-4 focus:ring-[#00ff99]/5 transition-all font-medium" 
                        placeholder="e.g., Python Mastery" required>
                </div>
                
                <div class="space-y-2">
                    <label class="block text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] ml-1">Symbol <span class="text-[#00ff99]">*</span></label>
                    <input type="text" name="icon" value="{{ topic.icon|default:'📚' }}" 
                        class="w-full bg-white/[0.03] border border-white/10 px-5 py-4 rounded-2xl text-white text-center text-xl focus:outline-none focus:border-[#00ff99]/50 transition-all" 
                        placeholder="📚" required>
                </div>
            </div>
            
            <div class="space-y-2">
                <label class="block text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] ml-1">Telemetry Description</label>
                <textarea name="description" rows="3" 
                    class="w-full bg-white/[0.03] border border-white/10 px-5 py-4 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:border-[#00ff99]/50 transition-all font-medium resize-none" 
                    placeholder="Brief objective of this module...">{{ topic.description|default:'' }}</textarea>
            </div>
            
            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-[#00ff99] text-black py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-[#00e68a] hover:shadow-[0_0_30px_rgba(0,255,153,0.3)] transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i>
                    {% if topic %}Sync Parameters{% else %}Deploy Module{% endif %}
                </button>
                <a href="{% url 'manage_topics' %}" class="flex-1 bg-white/5 text-slate-400 py-4 rounded-2xl font-black uppercase tracking-widest text-xs text-center border border-white/5 hover:bg-white/10 hover:text-white transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-xmark"></i>
                    Abort
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
