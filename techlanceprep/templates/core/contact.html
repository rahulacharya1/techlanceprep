{% extends 'base.html' %}

{% block title %}Contact - TechlancePrep{% endblock %}

{% block content %}
<div class="bg-primary text-white py-12">
    <div class="container mx-auto px-4 text-center">
        <h1 class="text-4xl font-bold">Contact Us</h1>
        <p class="text-gray-300 mt-4">Have questions? We'd love to hear from you.</p>
    </div>
</div>

<section class="py-16">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Your Name</label>
                    <input type="text" name="name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                    <input type="email" name="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Message</label>
                    <textarea name="message" rows="5" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required></textarea>
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-blue-800 transition">
                    Send Message
                </button>
            </form>
            
            <div class="mt-8 pt-8 border-t">
                <h3 class="font-bold mb-4">Other ways to connect:</h3>
                <div class="flex space-x-4">
                    <a href="#" class="text-gray-600 hover:text-primary text-2xl"><i class="fab fa-github"></i></a>
                    <a href="#" class="text-gray-600 hover:text-primary text-2xl"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="text-gray-600 hover:text-primary text-2xl"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
